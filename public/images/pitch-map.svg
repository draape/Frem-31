<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main pitch background -->
  <rect x="10" y="10" width="540" height="380" fill="#228B22" stroke="#1A5F1A" stroke-width="2"/>

  <!-- Center circle -->
  <circle cx="280" cy="200" r="40" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="280" cy="200" r="3" fill="white"/>

  <!-- Center line -->
  <line x1="280" y1="10" x2="280" y2="390" stroke="white" stroke-width="2"/>

  <!-- 5er zones -->
  <!-- 5er-C (top left) -->
  <rect x="30" y="30" width="120" height="150" fill="none" stroke="white" stroke-width="2"/>
  <rect x="30" y="20" width="120" height="20" fill="#2854FF"/>
  <text x="90" y="35" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Foreldresone 5er – C</text>
  <text x="90" y="110" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">5er – C</text>

  <!-- 5er-A (top right) -->
  <rect x="310" y="30" width="120" height="150" fill="none" stroke="white" stroke-width="2"/>
  <rect x="310" y="20" width="120" height="20" fill="#2854FF"/>
  <text x="370" y="35" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Foreldresone 5er – A</text>
  <text x="370" y="110" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">5er – A</text>

  <!-- 7er-B (middle left) -->
  <rect x="30" y="140" width="120" height="120" fill="none" stroke="white" stroke-width="2"/>
  <rect x="10" y="140" width="20" height="120" fill="#2854FF"/>
  <text x="20" y="200" font-family="Arial" font-size="8" fill="white" text-anchor="middle" transform="rotate(-90 20 200)">Foreldresone 7er – B</text>
  <text x="90" y="200" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">7er – B</text>

  <!-- 7er-A (middle right) -->
  <rect x="310" y="140" width="120" height="120" fill="none" stroke="white" stroke-width="2"/>
  <rect x="430" y="140" width="20" height="120" fill="#2854FF"/>
  <text x="440" y="200" font-family="Arial" font-size="8" fill="white" text-anchor="middle" transform="rotate(90 440 200)">Foreldresone 7er – A</text>
  <text x="370" y="200" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">7er – A</text>

  <!-- 5er-D (bottom left) -->
  <rect x="30" y="220" width="120" height="150" fill="none" stroke="white" stroke-width="2"/>
  <rect x="30" y="360" width="120" height="20" fill="#2854FF"/>
  <text x="90" y="375" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Foreldresone 5er – D</text>
  <text x="90" y="300" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">5er – D</text>

  <!-- 5er-B (bottom right) -->
  <rect x="310" y="220" width="120" height="150" fill="none" stroke="white" stroke-width="2"/>
  <rect x="310" y="360" width="120" height="20" fill="#2854FF"/>
  <text x="370" y="375" font-family="Arial" font-size="10" fill="white" text-anchor="middle">Foreldresone 5er – B</text>
  <text x="370" y="300" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">5er – B</text>

  <!-- Fremhuset indicator -->
  <rect x="550" y="100" width="40" height="200" fill="#D97706"/>
  <text x="570" y="200" font-family="Arial" font-size="10" fill="white" text-anchor="middle" transform="rotate(90 570 200)">Fremhuset</text>
</svg>
